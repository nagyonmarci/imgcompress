name: Repair frontend Dependabot pnpm lockfile

# Triggered by:
#   - workflow_dispatch (maintainers manually pick a PR number)
#   - PR comment "/chan-fix" by karimz1

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Dependabot PR number to repair"
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: repair-frontend-lockfile-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  repair:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login == 'karimz1' &&
        contains(github.event.comment.body, '/chan-fix')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Mint imgcompress-chan token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.IMGCOMPRESS_CHAN_APP_ID }}
          private-key: ${{ secrets.IMGCOMPRESS_CHAN_PRIVATE_KEY }}

      - name: Resolve and validate PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number || github.event.issue.number }}
        run: |
          set -euo pipefail

          echo "number=${PR_NUMBER_INPUT}" >> "$GITHUB_OUTPUT"

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER_INPUT}")"
          head_repo="$(jq -r '.head.repo.full_name' <<< "$pr_json")"
          head_ref="$(jq -r '.head.ref' <<< "$pr_json")"

          echo "head_ref=${head_ref}" >> "$GITHUB_OUTPUT"

          if [[ "$head_repo" != "$REPOSITORY" ]]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
            echo "Skipping repair: PR #${PR_NUMBER_INPUT} head repo ${head_repo} is a fork."
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.pr.outputs.is_fork != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node
        if: steps.pr.outputs.is_fork != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure git identity as imgcompress-chan
        if: steps.pr.outputs.is_fork != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          user_id="$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq '.id')"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Refresh branch from main
        if: steps.pr.outputs.is_fork != 'true'
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            echo "::error::Merge from main hit conflicts; resolve manually on the PR."
            exit 1
          fi

      - name: Regenerate frontend pnpm lockfile
        if: steps.pr.outputs.is_fork != 'true'
        env:
          PNPM_INSTALL_ARGS: "--lockfile-only --ignore-scripts"
        run: ./scripts/applyFrontendDependencyFix.sh

      - name: Push repaired branch
        if: steps.pr.outputs.is_fork != 'true'
        run: git push origin "HEAD:${{ steps.pr.outputs.head_ref }}"

      - name: Comment outcome on PR
        if: always() && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          IS_FORK: ${{ steps.pr.outputs.is_fork }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$IS_FORK" == "true" ]]; then
            body=$(cat <<'EOF'
          ### Can't reach this one from here 🥺

          Hi~! This PR comes from a fork, so I don't have permission to push the lockfile fix back to it. (╥﹏╥)

          If you'd like the repair anyway, please:

          1. Refresh your branch by merging `main` into it first
          2. Run `./scripts/applyFrontendDependencyFix.sh` locally
          3. Push the result up to your fork, ne~? 💛
          EOF
          )
          elif [[ "$STATUS" == "success" ]]; then
            body=$(cat <<'EOF'
          ### Frontend pnpm lockfile repaired! 🎉

          Yatta~! I refreshed your branch from `main` and regenerated `frontend/pnpm-lock.yaml` for you. (｡♥‿♥｡)

          Gonna take a little nap while pipeline re-runs on the new commit~ 💤
          EOF
          )
          else
            body=$(cat <<EOF
          ### Frontend pnpm lockfile repair 💔

          Uwaa... gomen, senpai. The repair finished with status \`${STATUS}\` and I couldn't fix it on my own. (╥﹏╥)

          Could you peek at the [run log](${RUN_URL}) when you have a sec? I'll be waiting right here, ne~? 💛
          EOF
          )
          fi
          gh pr comment --repo "$REPOSITORY" "$PR_NUMBER" --body "$body" \
            || echo "::warning::Could not comment on PR #${PR_NUMBER}."
